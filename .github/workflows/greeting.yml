name: Greet First-Time Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome Action
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "👋 Welcome to the RAINZ Arch Hyprland Rice! Thank you for opening your first issue. If this is a bug, please ensure you've included your system specs and logs. We'll take a look as soon as possible!"
          pr-message: "🎉 Thank you for your first Pull Request! We appreciate your contribution to making this rice better. A maintainer will review your changes shortly."
