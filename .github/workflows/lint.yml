name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
  push:
    paths:
      - "**/*.md"
  schedule:
    - cron: "0 1 * * 0" # Runs every Sunday at 01:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install markdownlint-cli
        run: npm install --global markdownlint-cli

      - name: Run markdownlint
        run: markdownlint "**/*.md"
