name: ShellCheck

on:
  push:
    paths:
      - "**/*.sh"
  pull_request:
    paths:
      - "**/*.sh"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./"
          format: gcc
