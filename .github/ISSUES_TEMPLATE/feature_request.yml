name: Feature request
description: Suggest an improvement or enhancement
title: "[FEATURE] "
labels: ["enhancement"]

body:

* type: textarea
  id: description
  attributes:
  label: Description
  placeholder: Clearly describe the feature...
  validations:
  required: true

* type: textarea
  id: motivation
  attributes:
  label: Motivation
  description: Why is this feature useful?
  placeholder: What problem does this solve?
  validations:
  required: true

* type: textarea
  id: implementation
  attributes:
  label: Proposed Implementation
  description: Optional idea for implementation

* type: textarea
  id: references
  attributes:
  label: References
  description: Links, screenshots, or inspiration
