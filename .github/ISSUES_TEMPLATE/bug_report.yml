name: Bug report
description: Report an issue to help improve stability
title: "[BUG] "
labels: ["bug"]

body:

* type: textarea
  id: description
  attributes:
  label: Description
  description: Provide a clear and concise description of the issue
  placeholder: Describe what happened...
  validations:
  required: true

* type: dropdown
  id: component
  attributes:
  label: Affected Component
  options:
  - Installation Script (install.sh)
  - Hyprland (window manager, rules, keybinds)
  - Noctalia Shell (bar, notifications, lockscreen)
  - Terminal / Shell (Ghostty, Kitty, Wezterm, Fish)
  - Theme / UI (Zen Browser, Yazi, fonts)
  - Other
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to Reproduce
  placeholder: |
  1. Go to ...
  2. Execute ...
  3. Observe the issue
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected Behavior
  placeholder: What should happen?
  validations:
  required: true

* type: textarea
  id: actual
  attributes:
  label: Actual Behavior
  placeholder: What actually happens?
  validations:
  required: true

* type: input
  id: os
  attributes:
  label: OS / Distro
  placeholder: Arch Linux / EndeavourOS / CachyOS
  validations:
  required: true

* type: input
  id: kernel
  attributes:
  label: Kernel Version
  placeholder: output of `uname -r`

* type: input
  id: gpu
  attributes:
  label: GPU
  placeholder: NVIDIA / AMD / Intel
  validations:
  required: true

* type: input
  id: display_server
  attributes:
  label: Display Server
  placeholder: Wayland (Hyprland)

* type: textarea
  id: monitors
  attributes:
  label: Monitor Setup
  placeholder: e.g., 1920x1080@144Hz + 2560x1440@60Hz

* type: dropdown
  id: install_method
  attributes:
  label: Installation Method
  options:
  - install.sh
  - Manual (stow)
  validations:
  required: true

* type: textarea
  id: hyprland_version
  attributes:
  label: Hyprland Version
  description: Output of `hyprctl version`
  render: bash

* type: textarea
  id: noctalia_version
  attributes:
  label: Noctalia Version
  description: Output of `pacman -Q noctalia-shell`
  render: bash

* type: textarea
  id: logs
  attributes:
  label: Logs
  description: Relevant logs (Hyprland / Noctalia)
  render: bash

* type: textarea
  id: additional
  attributes:
  label: Additional Context
  description: Screenshots, recordings, or extra details
