# ────────────────
# Kitty Config - Gruvbox Noir Dark (Ultra Smooth Edition)
# ────────────────

# Font
font_family      FantasqueSansM Nerd Font
bold_font        auto 
italic_font      auto
bold_italic_font auto
font_size        17

# ────────────────
# SPACING & LAYOUT
# ────────────────
window_padding_width  10
window_margin_width   8

# ────────────────
# PERFORMANCE (MAX SMOOTHNESS)
# ────────────────
repaint_delay        5
input_delay          0
sync_to_monitor      yes
enable_audio_bell    no

# ────────────────
# CURSOR (BUTTERY SMOOTH)
# ────────────────

cursor                  #ebdbb2

# Best looking smooth animation
cursor_shape            underline
cursor_underline_thickness 3

# Alternative (beam style)
# cursor_shape            beam
# cursor_beam_thickness   2.5

# Smooth breathing blink
cursor_blink_interval   0.45
cursor_stop_blinking_after 0

# MAIN ANIMATION MAGIC
cursor_trail            12
cursor_trail_decay      0.015 0.20

# ────────────────
# SELECTION
# ────────────────
selection_foreground   #fbf1c7
selection_background   #3a3a3a

# ────────────────
# COLORS
# ────────────────
foreground             #d4be98
background             #000000
background_opacity     0.80

# URL Highlight
url_color              #d79921

# ────────────────
# TAB BAR
# ────────────────
tab_bar_style           powerline
active_tab_background   #3c3836
active_tab_foreground   #fbf1c7
inactive_tab_background #141414
inactive_tab_foreground #7c6f64
tab_separator           "  "

# ────────────────
# BORDERS
# ────────────────
active_border_color     #d79921
inactive_border_color   #1d1d1d
bell_border_color       #cc241d

# ────────────────
# GRUVBOX NOIR COLORS
# ────────────────
color0  #0f0f0f
color1  #aa2222
color2  #78823c
color3  #a67c21
color4  #3a5a78
color5  #8e5d78
color6  #5c7f6a
color7  #928374

color8  #3c3836
color9  #bb4444
color10 #9bbc46
color11 #cfa935
color12 #689cb5
color13 #b07090
color14 #78b29c
color15 #ebdbb2

# ────────────────
# SCROLL & INPUT FEEL
# ────────────────
scrollback_lines        5000
mouse_hide_wait         1.5
wheel_scroll_multiplier 2.5

# ────────────────
# HYPERLINKS
# ────────────────
allow_hyperlinks yes

# ────────────────
# NERD FONT SYMBOLS
# ────────────────
symbol_map U+E0B0-U+E0B3 Hurmit Nerd Font

# ────────────────
# SHELL
# ────────────────
shell /bin/fish

# ────────────────
# LIGATURES
# ────────────────
enable_ligatures yes
disable_ligatures never

# ────────────────
# OPTIONAL CLEAN LOOK
# ────────────────
# hide_window_decorations yes
