# ────────────────
# Kitty Config - Gruvbox Noir Dark (Refined Aesthetic)
# ────────────────

# Font
font_family      Iosevka Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16

# Spacing (improved aesthetics)
window_padding_width  10
window_margin_width   8

# Performance (snappier feel)
repaint_delay        8
input_delay          0
sync_to_monitor      yes
enable_audio_bell    no

# Cursor (refined)
cursor                 #ebdbb2
cursor_shape           block 
cursor_blink_interval  0.5
cursor_stop_blinking_after 0
cursor_trail           2
cursor_trail_decay     0.08 0.3

# Selection
selection_foreground   #fbf1c7
selection_background   #3a3a3a

# Background & Foreground
foreground             #d4be98
background             #000000
background_opacity     0.92

# URL Highlight
url_color              #d79921

# Tab Bar (cleaner contrast)
tab_bar_style           powerline
active_tab_background   #3c3836
active_tab_foreground   #fbf1c7
inactive_tab_background #141414
inactive_tab_foreground #7c6f64
tab_separator           "  "

# Borders (minimal look)
active_border_color     #d79921
inactive_border_color   #1d1d1d
bell_border_color       #cc241d

# Gruvbox Noir-Dark Colors (unchanged)
color0  #0f0f0f
color1  #aa2222
color2  #78823c
color3  #a67c21
color4  #3a5a78
color5  #8e5d78
color6  #5c7f6a
color7  #928374

color8  #3c3836
color9  #bb4444
color10 #9bbc46
color11 #cfa935
color12 #689cb5
color13 #b07090
color14 #78b29c
color15 #ebdbb2

# Scrollback & Mouse (smoother)
scrollback_lines        5000
mouse_hide_wait         3.0
wheel_scroll_multiplier 3.0

# Hyperlinks
allow_hyperlinks yes

# Powerline Symbols Support
symbol_map U+E0B0-U+E0B3 Hurmit Nerd Font

# Shell
shell /bin/fish

# Ligatures (nice for coding)
enable_ligatures yes
disable_ligatures never

# Optional (uncomment if using tiling WM for ultra-clean look)
# hide_window_decorations yes
