unbind r
bind r source-file ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a

set -g mouse on

set-window-option -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position bottom
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g @plugin 'egel/tmux-gruvbox'

# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of the plugin list)
run '~/.tmux/plugins/tpm/tpm'

# Persist and auto-restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Tokyonight-night pointed statusline (dark + red)
set -g mode-style "fg=#c0caf5,bg=#1a1b26"

set -g message-style "fg=#c0caf5,bg=#1a1b26"
set -g message-command-style "fg=#c0caf5,bg=#1a1b26"

set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#f7768e"

set -g status on
set -g status-interval 5
set -g status-justify left

set -g status-style "fg=#a9b1d6,bg=#16161e"
set -g status-bg "#1a1b26"

set -g status-left-length 100
set -g status-right-length 100

set -g status-left-style none
set -g status-right-style none

set -g status-left "#[fg=#1a1b26,bg=#f7768e,bold] #S #[fg=#f7768e,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#c0caf5,bg=#3b4261] #I.#P #[fg=#3b4261,bg=#292e42,nobold,nounderscore,noitalics]#[fg=#c0caf5,bg=#292e42,bold] #{b:pane_current_path} #[fg=#292e42,bg=#1a1b26]"
set -g status-right "#[fg=#3b4261,bg=#1a1b26,nobold,nounderscore,noitalics]#[fg=#c0caf5,bg=#3b4261] %Y-%m-%d %H:%M #[fg=#f7768e,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#1a1b26,bg=#f7768e,bold] R A I N Z "

setw -g window-status-activity-style "underscore,fg=#c0caf5,bg=#1a1b26"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#565f89,bg=#1a1b26"
setw -g window-status-format '#[fg=#1a1b26,bg=#1a1b26]#[fg=#a9b1d6,bg=#1a1b26] #I  #{?#{==:#{b:pane_current_command},nvim},Neovim,#{?#{==:#{b:pane_current_command},opencode},OpenCode,#{?#{m:#{b:pane_current_command},(zsh|bash|fish)},ghostty,#{b:pane_current_command}}}} #[fg=#1a1b26,bg=#1a1b26,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#1a1b26,bg=#f7768e]#[fg=#1a1b26,bg=#f7768e] #I #[fg=#f7768e,bg=#1a1b26] #{?#{==:#{b:pane_current_command},nvim},Neovim,#{?#{==:#{b:pane_current_command},opencode},OpenCode,#{?#{m:#{b:pane_current_command},(zsh|bash|fish)},ghostty,#{b:pane_current_command}}}} #[fg=#f7768e,bg=#1a1b26,nobold]'
